name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest temporarily disabled — internal/cli/lifecycle.go
        # uses syscall.Kill + SysProcAttr.Setsid unconditionally. Re-enabled
        # when the resleeve/windows-port scope lands the build-tag split.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v6
        with:
          # Pin explicitly: the action's "latest" tag resolves to a
          # stale v1.64.8 (built with Go 1.24) which refuses to lint
          # projects targeting Go 1.25+. v2.12.x is built with a
          # newer Go and uses defaults when no .golangci.yml is present.
          version: v2.12.2
