name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint-action@v7 is required to run lint v2.x.
          # The lint binary needs to be built with a Go version >= the
          # project's `go` directive (currently 1.25.0).
          version: v2.12.2

  # Aggregate gate — the single status check wired into branch protection.
  # It depends on every other job, so the test matrix (OS list, job names)
  # can change freely without ever touching GitHub's required-checks config.
  # `if: always()` makes it run even when an upstream job fails, and the
  # result check below fails the gate if any dependency didn't succeed.
  tests:
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Require all upstream jobs to pass
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "gate failed — test=${{ needs.test.result }} lint=${{ needs.lint.result }}"
            exit 1
          fi
          echo "gate passed — test and lint both succeeded"
